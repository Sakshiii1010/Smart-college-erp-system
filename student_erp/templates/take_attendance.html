<!DOCTYPE html>
<html>

<head>

<title>Take Attendance</title>

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
    padding:30px;
}

.container{
    width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:8px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#007bff;
    color:white;
}

button{
    margin-top:20px;
    padding:10px 15px;
    background:#28a745;
    color:white;
    border:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Take Attendance – {{ subject.subject_name }}</h2>

<form method="POST">

<label>Date:</label>
<input type="date" name="date" required>

<table>

<tr>
<th>Student Name</th>
<th>Present</th>
<th>Absent</th>
</tr>

{% for student in students %}

<tr>

<td>{{ student.name }}</td>

<td>
<input type="radio" name="status_{{ student.id }}" value="Present" required>
</td>

<td>
<input type="radio" name="status_{{ student.id }}" value="Absent">
</td>

</tr>

{% endfor %}

</table>

<button type="submit">Submit Attendance</button>

</form>

</div>

</body>

</html>
