<!DOCTYPE html>
<html>

<head>
<title>All Students</title>

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
    padding:30px;
}

.container{
    width:1000px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
}

h2{
    text-align:center;
}

/* FILTER BAR */
.filter{
    margin-bottom:20px;
    text-align:center;
}

input, select{
    padding:8px;
    margin:5px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#007bff;
    color:white;
}

button{
    padding:5px 10px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h2>👨‍🎓 Students</h2>

<!-- FILTER + SEARCH -->
<form method="GET" class="filter">

<input type="text" name="search" placeholder="Search by name or enrollment">

<select name="course">
    <option value="">All Courses</option>
    <option>B.Tech CSE</option>
    <option>M.Tech CSE</option>
</select>

<select name="semester">
    <option value="">All Semesters</option>
    <option>1</option>
    <option>2</option>
    <option>3</option>
    <option>4</option>
    <option>5</option>
    <option>6</option>
    <option>7</option>
    <option>8</option>
</select>

<button type="submit">Filter</button>

</form>

<!-- TABLE -->
<table>

<tr>
<th>Name</th>
<th>Enrollment</th>
<th>Course</th>
<th>Semester</th>
</tr>

{% for student in students %}

<tr>
<td>{{ student.name }}</td>
<td>{{ student.enrollment }}</td>
<td>{{ student.course }}</td>
<td>{{ student.semester }}</td>
</tr>

{% endfor %}

</table>

</div>

</body>

</html>
