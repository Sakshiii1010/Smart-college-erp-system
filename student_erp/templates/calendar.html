<!DOCTYPE html>
<html>
<head>
<title>Academic Calendar</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

.container{
width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#007bff;
color:white;
}

.event-title{
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Academic Calendar</h2>

<table>

<tr>
<th>Date</th>
<th>Event</th>
<th>Description</th>
</tr>

{% for event in events %}

<tr>

<td>{{ event.event_date }}</td>

<td class="event-title">
{{ event.title }}
</td>

<td>
{{ event.description }}
</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
