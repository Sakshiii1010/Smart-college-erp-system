{% extends "admin_base.html" %}

{% block content %}

<style>
.wrapper {
    padding: 30px;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.add-btn {
    background: #28a745;
    color: white;
    padding: 10px 15px;
    text-decoration: none;
    border-radius: 6px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 12px;
    text-align: center;
}

th {
    background: #007bff;
    color: white;
}

.btn {
    padding: 6px 10px;
    border-radius: 5px;
    color: white;
    text-decoration: none;
}

.edit { background: orange; }
.delete { background: red; }

.event { color: #3498db; font-weight: bold; }
.notice { color: #e74c3c; font-weight: bold; }

</style>

<div class="wrapper">

    <div class="top-bar">
        <h2>Events & Notices</h2>
        <a href="/admin/add-events-and-notices" class="add-btn">+ Add</a>
    </div>

    <table>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Type</th>
            <th>Date</th>
            <th>Action</th>
        </tr>

        {% for item in data %}
        <tr>
            <td>{{ item.id }}</td>
            <td>{{ item.title }}</td>
            <td class="{{ item.type }}">{{ item.type }}</td>
            <td>{{ item.date }}</td>
            <td>
                <a href="/admin/edit-events-and-notices/{{ item.id }}" class="btn edit">Edit</a>
                <a href="/admin/delete-events-and-notices/{{ item.id }}" class="btn delete">Delete</a>
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

{% endblock %}
