<!DOCTYPE html>
<html>
<head>
    <title>Admission Applications</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
        }

        .container {
            width: 90%;
            margin: 30px auto;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Admission Applications</h2>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Course</th>
            <th>Message</th>
            <th>Date</th>
        </tr>

        {% for app in applications %}
        <tr>
            <td>{{ app.id }}</td>
            <td>{{ app.name }}</td>
            <td>{{ app.email }}</td>
            <td>{{ app.phone }}</td>
            <td>{{ app.course }}</td>
            <td>{{ app.message }}</td>
            <td>{{ app.created_at }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
