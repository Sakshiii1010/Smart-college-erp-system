<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            margin: 10px 0;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #34495e;
        }

        .main {
            flex: 1;
            padding: 20px;
            background: #ecf0f1;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>Admin Panel</h2>

    <a href="/admin/dashboard">🏠 Dashboard</a>
    <a href="/admin/students">👨‍🎓 Students</a>
    <a href="#">👩‍🏫 Faculty</a>
    <a href="#">🔔 Notifications</a>
    <a href="#">⚠️ Grievances</a>
    <a href="/">🚪 Logout</a>
</div>

<div class="main">
    {% block content %}{% endblock %}
</div>

</body>
</html>
